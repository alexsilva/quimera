[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "quimera"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "rich>=14.0",
]

[project.optional-dependencies]
ollama = ["openai>=1.0"]
api = ["openai>=1.0"]

[project.scripts]
quimera = "quimera.cli:main"

[tool.pytest.ini_options]
filterwarnings = [
    "ignore::UserWarning:rich",
]
